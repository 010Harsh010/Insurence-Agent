server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Upload / AI request tuning ──────────────────────────────────────────
    # Allow large document uploads (PDFs, images, etc.)
    client_max_body_size 50m;

    # Increase timeouts for long-running AI inference calls
    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Static React app ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy → Flask backend ──────────────────────────────────────
    # All /api/* requests are forwarded to backend:8000
    # The trailing slash on proxy_pass strips the /api prefix before forwarding:
    #   /api/chat  → backend:8000/chat
    #   /api/upload → backend:8000/upload
    location /api/ {
        proxy_pass http://backend:8000/;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming / SSE responses
        proxy_buffering off;
    }
}